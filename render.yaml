services:
  - type: web
    name: ai-code-review-ui
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./Dockerfile
    dockerCommand: streamlit run app.py --server.address=0.0.0.0 --server.port=$PORT --server.headless=true
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.6
      - key: REVIEW_HISTORY_DB_PATH
        value: /tmp/review_history.db
      - key: REPOSITORY_INDEX_PATH
        value: /tmp/repository_index.json

  - type: web
    name: ai-code-review-webhook
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./Dockerfile
    dockerCommand: uvicorn webhook_app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.6
      - key: REVIEW_HISTORY_DB_PATH
        value: /tmp/review_history.db
      - key: REPOSITORY_INDEX_PATH
        value: /tmp/repository_index.json
